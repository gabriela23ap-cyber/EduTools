<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Magic Timer | Timpul Jucăuș</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-aura: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --bubble-active-shadow: 0 15px 35px rgba(0,0,0,0.1);
            --text-main: #2d3436;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #fdfbfb;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* Fundal animat magic */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px); /* Efect de sticlă mată */
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 50px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.07);
            text-align: center;
            border: 2px solid rgba(255,255,255,0.7);
            position: relative;
        }

        /* Titlu Cartoonish Premium din Homepage */
        h1.cartoon-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 0;
        }

        h1.cartoon-title span {
            display: inline-block;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        /* Culori litere titlu */
        h1.cartoon-title span:nth-child(1) { color: #ff5e5e; } /* M */
        h1.cartoon-title span:nth-child(2) { color: #ffbd4a; } /* a */
        h1.cartoon-title span:nth-child(3) { color: #4ade80; } /* g */
        h1.cartoon-title span:nth-child(4) { color: #0ea5e9; } /* i */
        h1.cartoon-title span:nth-child(5) { color: #a855f7; } /* c */
        h1.cartoon-title span:nth-child(6) { color: transparent; width: 15px;} /* spațiu */
        h1.cartoon-title span:nth-child(7) { color: #ec4899; } /* T */
        h1.cartoon-title span:nth-child(8) { color: #ff5e5e; } /* i */
        h1.cartoon-title span:nth-child(9) { color: #ffbd4a; } /* m */
        h1.cartoon-title span:nth-child(10) { color: #4ade80; } /* e */
        h1.cartoon-title span:nth-child(11) { color: #6366f1; } /* r */

        p.subtitle {
            color: #636e72;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* ZONA SETUP (Interfață Gummy) */
        .setup-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-bottom: 50px;
            background: rgba(255,255,255,0.5);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid white;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: #6366f1;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        input {
            padding: 18px 25px;
            border-radius: 25px;
            border: 3px solid transparent;
            background: white;
            font-family: inherit;
            font-weight: 700;
            font-size: 18px;
            width: 160px;
            text-align: center;
            color: #1e293b;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 5px rgba(168, 85, 247, 0.1);
        }

        /* BUTOANE GUMMY */
        button {
            padding: 18px 40px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Buton START (Neon Pink/Orange) */
        button.start-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9f43 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4), inset 0 -5px 0 rgba(0,0,0,0.1);
        }

        /* Buton RESET (Soft Purple) */
        button.reset-btn {
            background: rgba(255,255,255,0.8);
            color: #a855f7;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
        }

        button:hover {
            transform: translateY(-5px) scale(1.03);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        /* REPREZENTAREA TIMPULUI: BULE 3D */
        .bubbles-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            perspective: 1000px;
        }

        .bubble-wrapper {
            position: relative;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .bubble {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.5s ease;
            box-shadow: var(--bubble-active-shadow), inset 0 -10px 20px rgba(0,0,0,0.05);
            border: 5px solid white;
            overflow: hidden;
        }

        /* Gradienturi curajoase pentru fiecare bulă (nth-child) */
        .bubble-wrapper:nth-child(4n+1) .bubble { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); color: #fff; } /* Pink */
        .bubble-wrapper:nth-child(4n+2) .bubble { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; } /* Blue */
        .bubble-wrapper:nth-child(4n+3) .bubble { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #fff; } /* Green */
        .bubble-wrapper:nth-child(4n+4) .bubble { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #fff; } /* Orange/Yellow */

        /* Bula Activă: Pulsează */
        .bubble-wrapper.active .bubble {
            transform: scale(1.1);
            animation: bubblePulse 2s infinite;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 30px rgba(255,255,255,0.8);
        }

        @keyframes bubblePulse {
            0% { box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 20px rgba(255,255,255,0.5); }
            50% { box-shadow: 0 25px 60px rgba(0,0,0,0.2), 0 0 40px rgba(255,255,255,0.9); }
            100% { box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 20px rgba(255,255,255,0.5); }
        }

        /* Bula Trecută: "Se Sparge" (Animație) */
        .bubble-wrapper.completed {
            transform: scale(0); /* Dispare complet */
            opacity: 0;
            pointer-events: none;
        }

        /* Steluța care apare în locul bulei sparte */
        .star-replacement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 50px;
            color: #fee140;
            text-shadow: 0 0 20px rgba(255, 225, 64, 0.8);
            transition: transform 0.5s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }

        .bubble-wrapper.completed .star-replacement {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .bubble-label {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .bubble-time {
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
        }

        .bubble-unit {
            font-size: 14px;
            font-weight: 600;
        }

        /* Mesaj Final Magic */
        #finishMessage {
            display: none;
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%, #ff9a9e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: celebration 1s ease-out;
            margin-bottom: 30px;
        }

        @keyframes celebration {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .back-home {
            position: fixed;
            bottom: 30px;
            left: 30px;
            text-decoration: none;
            color: #1e293b;
            background: rgba(255,255,255,0.7);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .back-home:hover {
            background: white;
            transform: translateX(-5px);
        }

        /* Ajustări Mobile */
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            .setup-zone { flex-direction: column; align-items: center; }
            input { width: 100%; }
            .bubble { width: 100px; height: 100px; }
            .bubble-time { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="cartoon-title">
            <span>M</span><span>a</span><span>g</span><span>i</span><span>c</span><span> </span><span>T</span><span>i</span><span>m</span><span>e</span><span>r</span>
        </h1>
        <p class="subtitle">O aventură vizuală a timpului, fără nicio presiune!</p>

        <div class="setup-zone" id="setup">
            <div class="input-group">
                <label>Aventura Totală (min)</label>
                <input type="number" id="totalMinutes" value="45" min="1" placeholder="ex: 60">
            </div>
            <div class="input-group">
                <label>O Bulă are (min)</label>
                <input type="number" id="chunkMinutes" value="15" min="1" placeholder="ex: 15">
            </div>
            <button class="start-btn" onclick="startTimer()">🚀 Începe Aventura</button>
        </div>

        <div class="timer-display">
            <div id="finishMessage">🎉 Felicitări! 🎉</div>
            <div class="bubbles-container" id="bubbles">
                </div>
            <div id="controls" style="display:none; margin-top: 40px;">
                <button class="reset-btn" onclick="resetTimer()">🔄 Aventura Nouă</button>
            </div>
        </div>
    </div>

    <a href="homepage.html" class="back-home">← Înapoi la Panou</a>

    <script>
        let interval;
        let totalSeconds;
        let chunkSeconds;
        let elapsedSeconds = 0;

        function startTimer() {
            const totalInput = document.getElementById('totalMinutes').value;
            const chunkInput = document.getElementById('chunkMinutes').value;
            
            const totalMin = parseInt(totalInput);
            const chunkMin = parseInt(chunkInput);

            if (isNaN(totalMin) || isNaN(chunkMin) || totalMin <= 0 || chunkMin <= 0 || chunkMin > totalMin) {
                alert("Oups! Introdu te rog numere magice valide. Bula nu poate fi mai mare decât aventura totală.");
                return;
            }

            totalSeconds = totalMin * 60;
            chunkSeconds = chunkMin * 60;
            elapsedSeconds = 0;

            // Ascundem setup-ul
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            document.getElementById('finishMessage').style.display = 'none';

            // Generăm bulele
            renderBubbles(totalMin, chunkMin);
            
            // Pornim cronometrul
            clearInterval(interval);
            updateVisuals(); // Update imediat pentru a marca prima bulă ca activă
            interval = setInterval(updateTimer, 1000);
        }

        function renderBubbles(totalMin, chunkMin) {
            const container = document.getElementById('bubbles');
            container.innerHTML = '';
            
            const numChunks = Math.ceil(totalMin / chunkMin);
            
            for (let i = 0; i < numChunks; i++) {
                // Wrapper pentru bulă + steluță
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';
                wrapper.id = `bubble-wrap-${i}`;

                // Timpul pentru etichetă
                let timeDisplay = chunkMin;
                if (i === numChunks - 1 && totalMin % chunkMin !== 0) {
                    timeDisplay = totalMin % chunkMin; // Ultima bulă poate fi mai mică
                }

                wrapper.innerHTML = `
                    <div class="bubble">
                        <div class="bubble-label">Etapa ${i + 1}</div>
                        <div class="bubble-time">${timeDisplay}</div>
                        <div class="bubble-unit">min</div>
                    </div>
                    <div class="star-replacement">⭐</div>
                `;
                container.appendChild(wrapper);
            }
        }

        function updateTimer() {
            elapsedSeconds++;
            
            if (elapsedSeconds >= totalSeconds) {
                clearInterval(interval);
                // Marcăm și ultima bulă ca fiind completată
                const numBubbles = document.querySelectorAll('.bubble-wrapper').length;
                handleBubbleTransition(numBubbles); // Sparge toate bulele

                // Afișăm mesajul final după ce se sparge ultima bulă
                setTimeout(() => {
                    document.getElementById('finishMessage').style.display = 'block';
                    document.getElementById('bubbles').style.display = 'none'; // Ascundem containerele cu steluțe
                }, 800);
                return;
            }

            updateVisuals();
        }

        function updateVisuals() {
            // Calculăm câte bule au fost completate integral
            const completedCount = Math.floor(elapsedSeconds / chunkSeconds);
            handleBubbleTransition(completedCount);
        }

        function handleBubbleTransition(completedCount) {
            const wrappers = document.querySelectorAll('.bubble-wrapper');
            
            wrappers.forEach((wrap, index) => {
                if (index < completedCount) {
                    // Sparge bula
                    wrap.classList.remove('active');
                    wrap.classList.add('completed');
                } else if (index === completedCount) {
                    // Bula curentă pulsează
                    wrap.classList.add('active');
                    wrap.classList.remove('completed');
                } else {
                    // Bulele viitoare așteaptă
                    wrap.classList.remove('active');
                    wrap.classList.remove('completed');
                }
            });
        }

        function resetTimer() {
            clearInterval(interval);
            document.getElementById('setup').style.display = 'flex';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('bubbles').innerHTML = '';
            document.getElementById('bubbles').style.display = 'flex'; // Reafișăm containerul
            document.getElementById('finishMessage').style.display = 'none';
        }
    </script>
</body>
</html>
